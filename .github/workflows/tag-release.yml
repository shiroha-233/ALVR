name: Release On Tag

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows Packages
    runs-on: windows-2022
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: choco install zip unzip pkgconfiglite wixtoolset -y --no-progress

      - name: Package streamer and launcher
        env:
          RUST_BACKTRACE: 1
        run: |
          cargo xtask package-streamer --gpl --ci
          cargo xtask package-launcher --ci

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          if-no-files-found: error
          path: |
            build/alvr_streamer_windows.zip
            build/alvr_launcher_windows.zip

  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 25088A0359807596
          echo "deb http://ppa.launchpad.net/pipewire-debian/pipewire-upstream/ubuntu $(lsb_release -cs) main" | sudo tee -a /etc/apt/sources.list.d/pipewire-upstream.list
          sudo add-apt-repository universe
          sudo apt-get update
          sudo apt-get install -y libfuse2 build-essential pkg-config nasm libva-dev libdrm-dev libvulkan-dev libx264-dev libx265-dev cmake libasound2-dev libjack-jackd2-dev libxrandr-dev libunwind-dev libgtk-3-dev libpipewire-0.3-dev libspa-0.2-dev

      - name: Package streamer and launcher
        env:
          RUST_BACKTRACE: 1
        run: |
          cargo xtask package-streamer --gpl --ci
          cargo xtask package-launcher --ci

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          if-no-files-found: error
          path: |
            build/alvr_streamer_linux.tar.gz
            build/alvr_launcher_linux.tar.gz

  build-android:
    name: Build Android Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3
        with:
          packages: platforms;android-32

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Package Android client
        env:
          RUST_BACKTRACE: 1
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo xtask package-client --ci

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          if-no-files-found: error
          path: build/alvr_client_android/alvr_client_android.apk

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-android
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/release-assets
          pattern: release-*
          merge-multiple: true

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ALVR ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            build/release-assets/alvr_streamer_windows.zip
            build/release-assets/alvr_launcher_windows.zip
            build/release-assets/alvr_streamer_linux.tar.gz
            build/release-assets/alvr_launcher_linux.tar.gz
            build/release-assets/alvr_client_android.apk
